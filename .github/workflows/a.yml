name: Build Docker image, scan and push to Docker Hub

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate timestamp
        id: timestamp
        run: echo "TIMESTAMP=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Build JAR (if Maven project)
        run: bash dep.sh

      - name: Create artifact folders
        run: |
          mkdir -p "GitHub Actions/Trivy"
          mkdir -p "GitHub Actions/artifacts"

      - name: Move JAR to artifacts
        run: |
          cp target/*.jar "GitHub Actions/artifacts/app-${{ steps.timestamp.outputs.TIMESTAMP }}.jar"

      # ---------------- DOCKER LOGIN ----------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # ---------------- BUILD & PUSH IMAGE ----------------
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/nothersecurity:latest

      # ---------------- TRIVY SCAN ----------------
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_HUB_USERNAME }}/nothersecurity:latest
          format: json
          output: GitHub Actions/Trivy/report-${{ steps.timestamp.outputs.TIMESTAMP }}.json
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM,LOW

      # ---------------- VERIFY RESULTS ----------------
      - name: Verify scan results exist
        run: ls -l "GitHub Actions/Trivy/"

      # ---------------- COMMIT RESULTS ----------------
      - name: Commit scan results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add "GitHub Actions/artifacts/"
          git add "GitHub Actions/Trivy/"

          git commit -m "Add build artifacts and Trivy scan results" || echo "No changes to commit"
          git push origin master

      # ---------------- EMAIL ----------------
      - name: Email Notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "[${{ job.status }}] Docker CI Pipeline"
          to: ${{ secrets.EMAIL_USER }}
          from: github-actions@yourorg.com
          body: |
            Workflow: ${{ github.workflow }}
            Status: ${{ job.status }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
